<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIXEL STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #16161a;
    --panel2: #1e1e24;
    --border: #2e2e3a;
    --accent: #ff6b35;
    --accent2: #ffd700;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --active: #ff6b35;
    --grid-color: rgba(255,255,255,0.06);
    --shadow: 0 4px 24px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  button, input, select, label { touch-action: auto; }
  #canvasWrapper { touch-action: none; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(255,107,53,0.5);
  }
  .logo span { color: var(--accent2); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover, .btn:active { background: var(--border); border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .btn.primary:hover { background: #ff8555; }
  .btn.danger { border-color: #ff4444; color: #ff4444; }
  .btn.danger:hover { background: #ff4444; color: #fff; }

  /* MAIN LAYOUT */
  .app {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* LEFT TOOLBAR */
  .toolbar {
    width: 56px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .tool-btn {
    width: 40px;
    height: 40px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    position: relative;
  }
  .tool-btn:hover { background: var(--panel2); color: var(--text); }
  .tool-btn.active {
    background: rgba(255,107,53,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .tool-sep {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .tool-label {
    font-size: 7px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    text-align: center;
    margin-top: 1px;
  }
  .tool-item { display: flex; flex-direction: column; align-items: center; }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,107,53,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(255,215,0,0.03) 0%, transparent 60%),
      var(--bg);
    position: relative;
  }
  .canvas-wrapper {
    position: relative;
    cursor: crosshair;
    box-shadow: 0 0 0 1px var(--border), var(--shadow);
  }
  #pixelCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #gridCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    image-rendering: pixelated;
  }
  #cursorCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    image-rendering: pixelated;
  }

  /* ZOOM */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(22,22,26,0.9);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    backdrop-filter: blur(8px);
  }
  .zoom-btn {
    width: 28px; height: 28px;
    border: none;
    background: var(--panel2);
    color: var(--text);
    cursor: pointer;
    border-radius: 50%;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { background: var(--accent); color: #fff; }
  #zoomLabel { font-size: 11px; color: var(--text-dim); min-width: 40px; text-align: center; }

  /* RIGHT PANEL */
  .right-panel {
    width: 220px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel-section {
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Press Start 2P', monospace;
  }

  /* COLOR PICKER */
  .color-display {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }
  .current-color-box {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .current-color-box::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
  }
  #colorInput {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .color-hex {
    font-size: 12px;
    color: var(--text);
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    flex: 1;
    font-family: 'Space Mono', monospace;
    width: 100%;
  }
  .color-hex:focus { outline: none; border-color: var(--accent); }

  /* OPACITY */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .slider-label { font-size: 10px; color: var(--text-dim); width: 28px; flex-shrink: 0; }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--panel2);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .slider-val { font-size: 10px; color: var(--text-dim); width: 24px; text-align: right; }

  /* PALETTE */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
    margin-bottom: 8px;
  }
  .swatch {
    aspect-ratio: 1;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.1s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.15); z-index: 1; border-color: #fff; }
  .swatch.selected { border: 2px solid #fff; box-shadow: 0 0 0 1px var(--accent); }
  .palette-actions { display: flex; gap: 6px; }
  .mini-btn {
    flex: 1;
    padding: 5px;
    font-size: 9px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
    text-align: center;
  }
  .mini-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* CANVAS SIZE */
  .size-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .size-input {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 4px;
    text-align: center;
    width: 60px;
  }
  .size-input:focus { outline: none; border-color: var(--accent); }
  .size-x { color: var(--text-dim); font-size: 12px; }

  /* LAYERS / HISTORY */
  .history-row {
    display: flex;
    gap: 6px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 11px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* TOOL TOOLTIP */
  .tool-btn::before {
    content: attr(data-tip);
    position: absolute;
    left: calc(100% + 8px);
    top: 50%;
    transform: translateY(-50%);
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
    font-family: 'Space Mono', monospace;
  }
  .tool-btn:hover::before { opacity: 1; }

  /* BRUSH SIZE */
  .brush-preview {
    width: 100%;
    height: 40px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  .brush-dot {
    background: var(--accent);
    border-radius: 1px;
    transition: all 0.2s;
  }

  @media (max-width: 600px) {
    .right-panel { width: 180px; }
    .toolbar { width: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PIXEL<span>STUDIO</span></div>
  <div class="header-actions">
    <button class="btn" id="undoBtn">↩ UNDO</button>
    <button class="btn" id="redoBtn">↪ REDO</button>
    <button class="btn danger" id="clearBtn">✕ CLEAR</button>
    <button class="btn primary" id="downloadBtn">↓ SAVE PNG</button>
  </div>
</header>

<div class="app">
  <!-- LEFT TOOLBAR -->
  <div class="toolbar">
    <div class="tool-item">
      <button class="tool-btn active" id="tool-pen" data-tool="pen" data-tip="Pen (P)">✏️</button>
      <div class="tool-label">PEN</div>
    </div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-eraser" data-tool="eraser" data-tip="Eraser (E)">🧹</button>
      <div class="tool-label">ERASE</div>
    </div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-fill" data-tool="fill" data-tip="Fill (F)">🪣</button>
      <div class="tool-label">FILL</div>
    </div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-eyedropper" data-tool="eyedropper" data-tip="Eyedropper (I)">💉</button>
      <div class="tool-label">PICK</div>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-line" data-tool="line" data-tip="Line (L)">╱</button>
      <div class="tool-label">LINE</div>
    </div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-rect" data-tool="rect" data-tip="Rectangle (R)">⬜</button>
      <div class="tool-label">RECT</div>
    </div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-circle" data-tool="circle" data-tip="Circle (C)">⭕</button>
      <div class="tool-label">CIRCLE</div>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-item">
      <button class="tool-btn" id="tool-move" data-tool="move" data-tip="Pan (Space)">✋</button>
      <div class="tool-label">PAN</div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="pixelCanvas"></canvas>
      <canvas id="gridCanvas"></canvas>
      <canvas id="cursorCanvas"></canvas>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut">−</button>
      <span id="zoomLabel">100%</span>
      <button class="zoom-btn" id="zoomIn">+</button>
      <button class="zoom-btn" id="zoomFit" title="Fit">⊡</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <!-- COLOR -->
    <div class="panel-section">
      <div class="panel-title">COLOR</div>
      <div class="color-display">
        <div class="current-color-box" id="colorBox">
          <input type="color" id="colorInput" value="#ff6b35">
        </div>
        <input class="color-hex" type="text" id="hexInput" value="#FF6B35" maxlength="7">
      </div>
      <div class="slider-row">
        <span class="slider-label">OPC</span>
        <input type="range" id="opacitySlider" min="1" max="100" value="100">
        <span class="slider-val" id="opacityVal">100</span>
      </div>
    </div>

    <!-- BRUSH -->
    <div class="panel-section">
      <div class="panel-title">BRUSH</div>
      <div class="brush-preview" id="brushPreview">
        <div class="brush-dot" id="brushDot" style="width:8px;height:8px;"></div>
      </div>
      <div class="slider-row">
        <span class="slider-label">SZ</span>
        <input type="range" id="brushSize" min="1" max="16" value="1">
        <span class="slider-val" id="brushVal">1</span>
      </div>
    </div>

    <!-- PALETTE -->
    <div class="panel-section">
      <div class="panel-title">PALETTE</div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="palette-actions">
        <button class="mini-btn" id="addSwatchBtn">+ ADD</button>
        <button class="mini-btn" id="clearSwatchBtn">− DEL</button>
      </div>
    </div>

    <!-- CANVAS SIZE -->
    <div class="panel-section">
      <div class="panel-title">CANVAS</div>
      <div class="size-row">
        <input class="size-input" type="number" id="canvasW" value="32" min="1" max="256">
        <span class="size-x">×</span>
        <input class="size-input" type="number" id="canvasH" value="32" min="1" max="256">
      </div>
      <button class="btn" id="resizeBtn" style="width:100%;font-size:10px;margin-bottom:6px">RESIZE</button>
      <button class="btn" id="newCanvasBtn" style="width:100%;font-size:10px">NEW CANVAS</button>
    </div>

    <!-- GRID -->
    <div class="panel-section">
      <div class="panel-title">GRID</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="showGrid" checked style="accent-color:var(--accent);width:16px;height:16px;">
        <label for="showGrid" style="font-size:11px;cursor:pointer;">Show Grid</label>
      </div>
    </div>

    <!-- EXPORT -->
    <div class="panel-section">
      <div class="panel-title">EXPORT</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div class="size-row" style="margin:0 0 6px;">
          <span style="font-size:10px;color:var(--text-dim);">Scale</span>
          <select id="exportScale" style="flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:10px;padding:4px;border-radius:4px;margin-left:8px;">
            <option value="1">1× (original)</option>
            <option value="2">2×</option>
            <option value="4" selected>4×</option>
            <option value="8">8×</option>
            <option value="16">16×</option>
          </select>
        </div>
        <button class="btn primary" id="exportBtn" style="font-size:10px;">↓ EXPORT PNG</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// PIXEL STUDIO
// ============================================================

const pixelCanvas = document.getElementById('pixelCanvas');
const gridCanvas = document.getElementById('gridCanvas');
const cursorCanvas = document.getElementById('cursorCanvas');
const ctx = pixelCanvas.getContext('2d');
const gctx = gridCanvas.getContext('2d');
const cctx = cursorCanvas.getContext('2d');

// STATE
let canvasW = 32, canvasH = 32;
let zoom = 12;
let offsetX = 0, offsetY = 0;
let currentTool = 'pen';
let currentColor = '#ff6b35';
let brushSize = 1;
let opacity = 1;
let showGrid = true;
let isDrawing = false;
let lastPx = -1, lastPy = -1;
let isPanning = false;
let panStartX = 0, panStartY = 0;
let panOffsetX = 0, panOffsetY = 0;
let lineStart = null;
let previewData = null;
let undoStack = [];
let redoStack = [];

// PIXEL DATA (RGBA for each pixel)
let pixelData = [];

function initPixels(w, h, preserve = false) {
  const old = pixelData;
  const oldW = canvasW, oldH = canvasH;
  canvasW = w; canvasH = h;
  pixelData = new Array(w * h).fill(null);
  if (preserve) {
    const minW = Math.min(w, oldW), minH = Math.min(h, oldH);
    for (let y = 0; y < minH; y++)
      for (let x = 0; x < minW; x++)
        pixelData[y * w + x] = old[y * oldW + x];
  }
}

// CANVAS SETUP
function setupCanvases() {
  const dw = canvasW * zoom;
  const dh = canvasH * zoom;
  [pixelCanvas, gridCanvas, cursorCanvas].forEach(c => {
    c.width = dw; c.height = dh;
    c.style.width = dw + 'px';
    c.style.height = dh + 'px';
  });
  document.getElementById('canvasWrapper').style.width = dw + 'px';
  document.getElementById('canvasWrapper').style.height = dh + 'px';
  render();
  renderGrid();
}

function render() {
  ctx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
  // Checker bg
  const s = zoom;
  for (let y = 0; y < canvasH; y++) {
    for (let x = 0; x < canvasW; x++) {
      const c = (x + y) % 2 === 0 ? '#1a1a20' : '#14141a';
      ctx.fillStyle = c;
      ctx.fillRect(x * s, y * s, s, s);
    }
  }
  // Pixels
  for (let i = 0; i < pixelData.length; i++) {
    if (pixelData[i]) {
      const x = i % canvasW;
      const y = Math.floor(i / canvasW);
      ctx.fillStyle = pixelData[i];
      ctx.fillRect(x * s, y * s, s, s);
    }
  }
}

function renderGrid() {
  gctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  if (!showGrid || zoom < 4) return;
  gctx.strokeStyle = 'rgba(255,255,255,0.07)';
  gctx.lineWidth = 0.5;
  for (let x = 0; x <= canvasW; x++) {
    gctx.beginPath();
    gctx.moveTo(x * zoom, 0);
    gctx.lineTo(x * zoom, canvasH * zoom);
    gctx.stroke();
  }
  for (let y = 0; y <= canvasH; y++) {
    gctx.beginPath();
    gctx.moveTo(0, y * zoom);
    gctx.lineTo(canvasW * zoom, y * zoom);
    gctx.stroke();
  }
}

function renderCursor(px, py) {
  cctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
  if (px < 0 || py < 0 || px >= canvasW || py >= canvasH) return;
  const s = zoom;
  const half = Math.floor(brushSize / 2);
  cctx.strokeStyle = 'rgba(255,255,255,0.8)';
  cctx.lineWidth = 1;
  cctx.strokeRect(
    (px - half) * s + 0.5,
    (py - half) * s + 0.5,
    brushSize * s - 1,
    brushSize * s - 1
  );
}

// PIXEL COORD
function getPixelCoord(e) {
  const rect = pixelCanvas.getBoundingClientRect();
  const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
  const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
  return [Math.floor(cx / zoom), Math.floor(cy / zoom)];
}

// DRAW PIXEL
function drawPixel(px, py, color) {
  const half = Math.floor(brushSize / 2);
  for (let dy = -half; dy < brushSize - half; dy++) {
    for (let dx = -half; dx < brushSize - half; dx++) {
      const nx = px + dx, ny = py + dy;
      if (nx >= 0 && nx < canvasW && ny >= 0 && ny < canvasH) {
        pixelData[ny * canvasW + nx] = color;
      }
    }
  }
}

// LINE BRESENHAM
function getLinePixels(x0, y0, x1, y1) {
  const pts = [];
  let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    pts.push([x0, y0]);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
  return pts;
}

// FILL
function floodFill(px, py, fillColor) {
  const idx = py * canvasW + px;
  const target = pixelData[idx];
  if (target === fillColor) return;
  const stack = [idx];
  const visited = new Set();
  while (stack.length) {
    const i = stack.pop();
    if (visited.has(i)) continue;
    visited.add(i);
    if (pixelData[i] !== target) continue;
    pixelData[i] = fillColor;
    const x = i % canvasW, y = Math.floor(i / canvasW);
    if (x > 0) stack.push(i - 1);
    if (x < canvasW - 1) stack.push(i + 1);
    if (y > 0) stack.push(i - canvasW);
    if (y < canvasH - 1) stack.push(i + canvasW);
  }
}

// RECT PIXELS
function getRectPixels(x0, y0, x1, y1) {
  const pts = [];
  const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
  const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
  for (let x = minX; x <= maxX; x++) { pts.push([x, minY]); pts.push([x, maxY]); }
  for (let y = minY + 1; y < maxY; y++) { pts.push([minX, y]); pts.push([maxX, y]); }
  return pts;
}

// CIRCLE PIXELS (midpoint)
function getCirclePixels(cx, cy, rx, ry) {
  const pts = [];
  const r = Math.round(Math.max(Math.abs(rx - cx), Math.abs(ry - cy)));
  let x = 0, y = r, d = 3 - 2 * r;
  while (y >= x) {
    [
      [cx+x,cy+y],[cx-x,cy+y],[cx+x,cy-y],[cx-x,cy-y],
      [cx+y,cy+x],[cx-y,cy+x],[cx+y,cy-x],[cx-y,cy-x]
    ].forEach(p => pts.push(p));
    if (d < 0) d += 4*x+6; else { d += 4*(x-y)+10; y--; }
    x++;
  }
  return pts;
}

// UNDO/REDO
function saveState() {
  undoStack.push([...pixelData]);
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push([...pixelData]);
  pixelData = undoStack.pop();
  render();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push([...pixelData]);
  pixelData = redoStack.pop();
  render();
}

// COLOR UTILS
function hexToRgba(hex, a = 1) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function getDrawColor() {
  if (currentTool === 'eraser') return null;
  return hexToRgba(currentColor, opacity);
}

// EVENTS
const wrapper = document.getElementById('canvasWrapper');

function onStart(e) {
  e.preventDefault();
  const [px, py] = getPixelCoord(e.touches ? e : e);

  if (currentTool === 'move') {
    isPanning = true;
    panStartX = e.clientX ?? e.touches[0].clientX;
    panStartY = e.clientY ?? e.touches[0].clientY;
    return;
  }

  if (currentTool === 'eyedropper') {
    const idx = py * canvasW + px;
    const c = pixelData[idx];
    if (c) {
      // extract hex from rgba
      const m = c.match(/rgba?\((\d+),(\d+),(\d+)/);
      if (m) {
        const hex = '#' + [m[1],m[2],m[3]].map(v => parseInt(v).toString(16).padStart(2,'0')).join('').toUpperCase();
        setColor(hex);
        showToast('Color picked: ' + hex);
      }
    }
    return;
  }

  if (currentTool === 'fill') {
    saveState();
    if (px >= 0 && px < canvasW && py >= 0 && py < canvasH) {
      floodFill(px, py, getDrawColor());
      render();
    }
    return;
  }

  if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle') {
    saveState();
    lineStart = [px, py];
    previewData = [...pixelData];
    isDrawing = true;
    return;
  }

  saveState();
  isDrawing = true;
  lastPx = px; lastPy = py;
  drawPixel(px, py, getDrawColor());
  render();
  renderCursor(px, py);
}

function onMove(e) {
  if (isDrawing || isPanning) e.preventDefault();
  const [px, py] = getPixelCoord(e.touches ? e : e);
  renderCursor(px, py);

  if (isPanning) {
    const dx = (e.clientX ?? e.touches[0].clientX) - panStartX;
    const dy = (e.clientY ?? e.touches[0].clientY) - panStartY;
    const area = document.getElementById('canvasArea');
    area.scrollLeft -= dx;
    area.scrollTop -= dy;
    panStartX = e.clientX ?? e.touches[0].clientX;
    panStartY = e.clientY ?? e.touches[0].clientY;
    return;
  }

  if (!isDrawing) return;

  if ((currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle') && lineStart) {
    pixelData = [...previewData];
    let pts = [];
    if (currentTool === 'line') pts = getLinePixels(lineStart[0], lineStart[1], px, py);
    else if (currentTool === 'rect') pts = getRectPixels(lineStart[0], lineStart[1], px, py);
    else pts = getCirclePixels(lineStart[0], lineStart[1], px, py);
    const c = getDrawColor();
    pts.forEach(([x, y]) => {
      if (x >= 0 && x < canvasW && y >= 0 && y < canvasH)
        pixelData[y * canvasW + x] = c;
    });
    render();
    return;
  }

  if (currentTool === 'pen' || currentTool === 'eraser') {
    if (px !== lastPx || py !== lastPy) {
      const pts = getLinePixels(lastPx, lastPy, px, py);
      pts.forEach(([x, y]) => drawPixel(x, y, getDrawColor()));
      lastPx = px; lastPy = py;
      render();
    }
  }
}

function onEnd(e) {
  isDrawing = false;
  isPanning = false;
  lineStart = null;
  previewData = null;
}

// Mouse events
wrapper.addEventListener('mousedown', onStart);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
wrapper.addEventListener('mouseleave', () => { cctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height); });

// Touch events
wrapper.addEventListener('touchstart', onStart, { passive: false });
window.addEventListener('touchmove', onMove, { passive: false });
wrapper.addEventListener('touchend', onEnd, { passive: true });
// reset state kalau jari lepas di luar canvas
window.addEventListener('touchend', (e) => {
  if (!wrapper.contains(e.target)) { isDrawing = false; isPanning = false; lineStart = null; previewData = null; }
});

// Two-finger pinch zoom
let pinchDist = null;
let pinchZoom = null;
wrapper.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
    pinchZoom = zoom;
  }
}, { passive: false });

wrapper.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchDist !== null) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx*dx + dy*dy);
    let nz = Math.round(pinchZoom * d / pinchDist);
    nz = Math.max(1, Math.min(64, nz));
    if (nz !== zoom) { zoom = nz; setupCanvases(); updateZoomLabel(); }
  }
}, { passive: false });

wrapper.addEventListener('touchend', (e) => { if (e.touches.length < 2) pinchDist = null; }, { passive: false });

// Scroll wheel zoom
document.getElementById('canvasArea').addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1 : -1;
  zoom = Math.max(1, Math.min(64, zoom + delta * Math.ceil(zoom / 8)));
  setupCanvases();
  updateZoomLabel();
}, { passive: false });

// ZOOM BUTTONS
document.getElementById('zoomIn').addEventListener('click', () => {
  zoom = Math.min(64, zoom + Math.max(1, Math.floor(zoom / 4)));
  setupCanvases(); updateZoomLabel();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  zoom = Math.max(1, zoom - Math.max(1, Math.floor(zoom / 4)));
  setupCanvases(); updateZoomLabel();
});
document.getElementById('zoomFit').addEventListener('click', fitCanvas);

function fitCanvas() {
  const area = document.getElementById('canvasArea');
  const aw = area.clientWidth - 40, ah = area.clientHeight - 80;
  zoom = Math.floor(Math.min(aw / canvasW, ah / canvasH));
  zoom = Math.max(1, Math.min(64, zoom));
  setupCanvases(); updateZoomLabel();
}

function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = zoom + '×';
}

// TOOLS
document.querySelectorAll('[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTool = btn.dataset.tool;
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    wrapper.style.cursor = currentTool === 'move' ? 'grab' : 'crosshair';
  });
});

// KEYBOARD SHORTCUTS
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const map = { p: 'pen', e: 'eraser', f: 'fill', i: 'eyedropper', l: 'line', r: 'rect', c: 'circle' };
  if (map[e.key]) {
    currentTool = map[e.key];
    document.querySelectorAll('[data-tool]').forEach(b => {
      b.classList.toggle('active', b.dataset.tool === currentTool);
    });
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.key === ' ') { e.preventDefault(); currentTool = 'move'; document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === 'move')); }
});

// COLOR
function setColor(hex) {
  currentColor = hex;
  document.getElementById('colorBox').style.background = hex;
  document.getElementById('colorInput').value = hex;
  document.getElementById('hexInput').value = hex.toUpperCase();
  updateBrushPreview();
}

document.getElementById('colorInput').addEventListener('input', (e) => setColor(e.target.value));
document.getElementById('hexInput').addEventListener('change', (e) => {
  let v = e.target.value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
});

document.getElementById('opacitySlider').addEventListener('input', (e) => {
  opacity = e.target.value / 100;
  document.getElementById('opacityVal').textContent = e.target.value;
});

// BRUSH SIZE
document.getElementById('brushSize').addEventListener('input', (e) => {
  brushSize = parseInt(e.target.value);
  document.getElementById('brushVal').textContent = brushSize;
  updateBrushPreview();
});

function updateBrushPreview() {
  const dot = document.getElementById('brushDot');
  const sz = brushSize * 8;
  dot.style.width = sz + 'px';
  dot.style.height = sz + 'px';
  dot.style.background = currentColor;
  dot.style.maxWidth = '120px';
  dot.style.maxHeight = '32px';
}

// PALETTE
const DEFAULT_PALETTE = [
  '#000000','#1a1a2e','#16213e','#0f3460','#533483','#e94560',
  '#ff6b35','#ffd700','#2ecc71','#1abc9c','#3498db','#9b59b6',
  '#e74c3c','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad',
  '#ffffff','#ecf0f1','#bdc3c7','#95a5a6','#7f8c8d','#6b6b80',
  '#d35400','#c0392b','#2c3e50','#34495e','#f39c12','#16a085',
  '#00b4d8','#caf0f8','#023e8a','#ff77a9','#c77dff','#e2d9f3',
];
let palette = [...DEFAULT_PALETTE];

function renderPalette() {
  const grid = document.getElementById('paletteGrid');
  grid.innerHTML = '';
  palette.forEach((color, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = color;
    if (color === currentColor) sw.classList.add('selected');
    sw.title = color;
    sw.addEventListener('click', () => { setColor(color); renderPalette(); });
    grid.appendChild(sw);
  });
}

document.getElementById('addSwatchBtn').addEventListener('click', () => {
  if (palette.length >= 64) { showToast('Palette penuh!'); return; }
  palette.push(currentColor);
  renderPalette();
});

document.getElementById('clearSwatchBtn').addEventListener('click', () => {
  const idx = palette.indexOf(currentColor);
  if (idx !== -1) { palette.splice(idx, 1); renderPalette(); }
});

// GRID TOGGLE
document.getElementById('showGrid').addEventListener('change', (e) => {
  showGrid = e.target.checked;
  renderGrid();
});

// UNDO/REDO BUTTONS
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

// CLEAR
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Hapus semua pixel?')) return;
  saveState();
  pixelData = new Array(canvasW * canvasH).fill(null);
  render();
});

// RESIZE
document.getElementById('resizeBtn').addEventListener('click', () => {
  const w = parseInt(document.getElementById('canvasW').value);
  const h = parseInt(document.getElementById('canvasH').value);
  if (!w || !h || w < 1 || h > 256) return;
  saveState();
  initPixels(w, h, true);
  fitCanvas();
  setupCanvases();
  updateZoomLabel();
});

// NEW CANVAS
document.getElementById('newCanvasBtn').addEventListener('click', () => {
  if (!confirm('Buat canvas baru? Semua pixel akan hilang.')) return;
  const w = parseInt(document.getElementById('canvasW').value) || 32;
  const h = parseInt(document.getElementById('canvasH').value) || 32;
  saveState();
  initPixels(w, h);
  fitCanvas();
  setupCanvases();
  updateZoomLabel();
});

// DOWNLOAD
function exportPNG() {
  const scale = parseInt(document.getElementById('exportScale').value);
  const oc = document.createElement('canvas');
  oc.width = canvasW * scale;
  oc.height = canvasH * scale;
  const octx = oc.getContext('2d');
  octx.imageSmoothingEnabled = false;
  for (let i = 0; i < pixelData.length; i++) {
    if (pixelData[i]) {
      const x = i % canvasW, y = Math.floor(i / canvasW);
      octx.fillStyle = pixelData[i];
      octx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  const a = document.createElement('a');
  a.href = oc.toDataURL('image/png');
  a.download = 'pixel-art.png';
  a.click();
  showToast('File tersimpan!');
}

document.getElementById('downloadBtn').addEventListener('click', exportPNG);
document.getElementById('exportBtn').addEventListener('click', exportPNG);

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// INIT
initPixels(32, 32);
renderPalette();
setColor('#ff6b35');
updateBrushPreview();
setTimeout(() => { fitCanvas(); setupCanvases(); updateZoomLabel(); }, 50);
</script>

<script>
// Android bridge - save PNG to gallery
function exportPNGAndroid() {
  const scale = parseInt(document.getElementById('exportScale').value) || 1;
  const oc = document.createElement('canvas');
  oc.width = canvasW * scale;
  oc.height = canvasH * scale;
  const octx = oc.getContext('2d');
  octx.imageSmoothingEnabled = false;
  for (let i = 0; i < pixelData.length; i++) {
    if (pixelData[i]) {
      const x = i % canvasW, y = Math.floor(i / canvasW);
      octx.fillStyle = pixelData[i];
      octx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  const dataUrl = oc.toDataURL('image/png');
  if (window.AndroidBridge) {
    // Strip prefix "data:image/png;base64,"
    const base64 = dataUrl.split(',')[1];
    window.AndroidBridge.saveImage(base64);
  } else {
    // Fallback web download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'pixel-art.png';
    a.click();
  }
  showToast('Gambar tersimpan ke galeri!');
}

// Override download buttons to use Android bridge
document.addEventListener('DOMContentLoaded', function() {
  // override after original listeners
}, false);

// Patch export on load
window.addEventListener('load', () => {
  const dlBtn = document.getElementById('downloadBtn');
  const exBtn = document.getElementById('exportBtn');
  if (dlBtn) dlBtn.onclick = exportPNGAndroid;
  if (exBtn) exBtn.onclick = exportPNGAndroid;
});
</script>
